<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if else e switch no java</title>
</head>
<body>
    <main>
        <h1>Exemplo semáforo</h1>
        <h1>Exemplo mês</h1>
        </main>

        <script>
        semaforo = "verde";

        if (semaforo == "verde"){
        console.log("Liberado");
    } else if (semaforo == "amarelo"){
        console.log("Atenção");
    } else{
        console.log("Parar");
    }


    let mes = 2;
    switch(mes){
        case 1:
                console.log("Aconteceu no primeiro semestre do ano.");
                break;
                case 2:
                            console.log("Aconteceu no segundo semestre do ano.");
                            break;
                            default:
                                console.log("Não aconteceu nesse ano.");
                                break;
    }

            </script>
</body>
